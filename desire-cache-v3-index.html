<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DESIRE_CACHE.sys</title>
  <link rel="stylesheet" href="style.css?v=19">
</head>
<body>
  <div class="noise"></div>
  <div class="shell">
    <header class="hero">
      <div class="hero-topline">PERSONAL ACQUISITION INDEX // RESTRICTED VISION</div>
      <h1>DESIRE_CACHE<span>.sys</span></h1>
      <p class="hero-copy">A curated archive of desirable objects, acquisition vectors, and unstable impulses.</p>
      <div class="hero-meta">
        <span>TOTAL <strong id="stat-total">0</strong></span>
        <span>VISIBLE <strong id="stat-visible">0</strong></span>
        <span>HOT <strong id="stat-hot">0</strong></span>
        <span>SALE <strong id="stat-sale">0</strong></span>
      </div>
    </header>

    <section class="panel status-panel">
      <div class="status-cell">
        <label>LAST_SYNC</label>
        <div id="sync-time">PENDING</div>
      </div>
      <div class="status-cell">
        <label>DATA_SOURCE</label>
        <div id="system-source">UNKNOWN</div>
      </div>
      <div class="status-cell emphasis">
        <label>PRIME_VECTOR</label>
        <a href="https://www.amazon.com/hz/wishlist/ls/L1HBFOQJJCER" target="_blank" rel="noopener noreferrer">AMAZON_DRONE_MANIFEST</a>
      </div>
    </section>

    <section class="panel filters">
      <div class="filter-block wide">
        <label for="search-filter">SEARCH</label>
        <input id="search-filter" type="text" placeholder="query objects, vendors, sections, dossiers...">
      </div>
      <div class="filter-block">
        <label for="section-filter">SECTION</label>
        <select id="section-filter"></select>
      </div>
      <div class="filter-block">
        <label for="priority-filter">PRIORITY</label>
        <select id="priority-filter"></select>
      </div>
      <div class="filter-block">
        <label for="source-filter">SOURCE</label>
        <select id="source-filter"></select>
      </div>
    </section>

    <main>
      <section class="object-grid" id="object-grid"></section>
    </main>
  </div>
  <script src="script.js?v=19"></script>
</body>
</html>
