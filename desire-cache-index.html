<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIRE_CACHE.sys</title>
    <link rel="stylesheet" href="style.css?v=17">
</head>
<body>
    <div class="scanline"></div>
    <div class="container">
        <header>
            <h1 class="glitch" data-text="DESIRE_CACHE.sys">DESIRE_CACHE.sys</h1>
            <p class="subtitle">// GIFT_PROTOCOL</p>
        </header>

        <!-- Amazon Drone Banner -->
        <a href="https://www.amazon.com/hz/wishlist/ls/L1HBFOQJJCER" target="_blank" class="drone-banner">
            <div class="drone-banner-stripe"></div>
            <div class="drone-banner-content">
                <span class="drone-banner-icon">🚁</span>
                <span class="drone-banner-text">AMAZON_MATRIX <span class="drone-banner-separator">//</span> DRONE_SWARM_DEPLOYED</span>
                <span class="drone-banner-icon">🚁</span>
            </div>
            <div class="drone-banner-stripe"></div>
        </a>

        <!-- Ability Points Section -->
        <section class="dynamic-section ability-section">
            <h2 class="section-title levelup-title">
                <span class="bracket">⬡</span>
                <span class="text">ABILITY_POINT_ADDITIONS</span>
                <span class="bracket">⬡</span>
            </h2>
            <div id="ability-accordion" class="subsection-accordion">
                <!-- Accordion subsections will be dynamically loaded here -->
            </div>
        </section>

        <!-- Tech Items Section -->
        <section class="dynamic-section shop-section">
            <h2 class="section-title shop-title">
                <span class="text">HARDWARE_MATRIX</span>
            </h2>
            <div id="hardware-accordion" class="subsection-accordion">
                <!-- Accordion subsections will be dynamically loaded here -->
            </div>
        </section>

        <!-- Clothing Items Section -->
        <section class="dynamic-section clothing-section">
            <h2 class="section-title clothing-title">
                <span class="text">BIOMECHANICAL_SHELL</span>
            </h2>
            <div id="biomech-accordion" class="subsection-accordion">
                <!-- Accordion subsections will be dynamically loaded here -->
            </div>
        </section>

        <!-- Comfort Status Section -->
        <section class="dynamic-section comfort-section">
            <h2 class="section-title comfort-title">
                <span class="bracket">▰</span>
                <span class="text">COMFORT_STATUS_UPGRADES</span>
                <span class="bracket">▰</span>
            </h2>
            <div id="comfort-accordion" class="subsection-accordion">
                <!-- Accordion subsections will be dynamically loaded here -->
            </div>
        </section>

        <!-- Loading and Error Messages -->
        <div id="loading" class="loading">
            <span class="loading-text">INITIALIZING PROTOCOL...</span>
        </div>
        <div id="error" class="error" style="display: none;">
            <span class="error-text">ERROR: CONNECTION FAILED</span>
        </div>
    </div>

    <script src="script.js?v=16"></script>
</body>
</html>
